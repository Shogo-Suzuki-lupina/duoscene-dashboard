<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デュオセーヌ 営業・集客ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --border: #1e2330;
  --accent: #4f8ef7;
  --accent2: #f7c14f;
  --accent3: #4ff7a0;
  --danger: #f74f4f;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #4a5568;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  padding: 48px; width: 360px; border-radius: 4px;
}
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--accent); margin-bottom: 8px; }
.login-sub { color: var(--text2); font-size: 12px; margin-bottom: 32px; letter-spacing: 1px; }
.login-box input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; font-size: 14px; border-radius: 2px;
  outline: none; margin-bottom: 12px; font-family: 'DM Mono', monospace;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%; background: var(--accent); color: #fff; border: none;
  padding: 12px; font-size: 14px; cursor: pointer; border-radius: 2px;
  font-family: 'Noto Sans JP', sans-serif; font-weight: 500; letter-spacing: 1px;
  transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

/* MAIN */
#main { display: none; }
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 24px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); }
.logo-sub { color: var(--text2); font-size: 11px; letter-spacing: 2px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.last-updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 32px; background: var(--surface); }
.tab {
  padding: 12px 20px; font-size: 12px; color: var(--text2); cursor: pointer;
  border-bottom: 2px solid transparent; letter-spacing: 1px; transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 20px 24px; border-radius: 4px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
}
.kpi-card.warn::before { background: var(--accent2); }
.kpi-card.good::before { background: var(--accent3); }
.kpi-card.bad::before { background: var(--danger); }
.kpi-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-bottom: 8px; }
.kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--text); letter-spacing: 2px; line-height: 1; }
.kpi-unit { font-size: 14px; color: var(--text2); margin-left: 4px; }
.kpi-meta { font-size: 11px; color: var(--text2); margin-top: 8px; }
.kpi-delta { font-family: 'DM Mono', monospace; font-size: 12px; }
.kpi-delta.up { color: var(--accent3); }
.kpi-delta.down { color: var(--danger); }
.kpi-target { color: var(--text3); }

/* CHARTS */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 20px 24px; border-radius: 4px;
}
.chart-card.wide { grid-column: span 2; }
.chart-title { font-size: 11px; color: var(--text2); letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
.chart-wrap { position: relative; height: 200px; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th {
  text-align: left; padding: 10px 12px; color: var(--text3);
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); font-weight: 400;
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); color: var(--text); }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 2px;
  font-size: 10px; letter-spacing: 1px;
}
.badge-good { background: rgba(79,247,160,0.1); color: var(--accent3); }
.badge-warn { background: rgba(247,193,79,0.1); color: var(--accent2); }
.badge-bad { background: rgba(247,79,79,0.1); color: var(--danger); }

/* AI INSIGHT */
.insight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.insight-card {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 16px; border-radius: 4px; border-left: 3px solid var(--accent);
}
.insight-card.warn { border-left-color: var(--accent2); }
.insight-card.good { border-left-color: var(--accent3); }
.insight-tag { font-size: 10px; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
.insight-text { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* LOADING */
.loading { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; padding: 40px; text-align: center; }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--text2); }

/* FUNNEL */
.funnel { display: flex; align-items: flex-end; gap: 0; height: 160px; margin: 16px 0; }
.funnel-step { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
.funnel-bar { width: 80%; background: var(--accent); opacity: 0.7; border-radius: 2px 2px 0 0; transition: opacity 0.2s; position: relative; }
.funnel-bar:hover { opacity: 1; }
.funnel-label { font-size: 10px; color: var(--text3); margin-top: 8px; letter-spacing: 1px; }
.funnel-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); }
.funnel-cvr { font-size: 10px; color: var(--accent2); font-family: 'DM Mono', monospace; }

/* PROGRESS BAR */
.progress-bar { background: var(--border); height: 4px; border-radius: 2px; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.8s ease; }
.progress-fill.warn { background: var(--accent2); }
.progress-fill.good { background: var(--accent3); }
.progress-fill.bad { background: var(--danger); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .chart-card.wide { grid-column: span 1; }
  .insight-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">DUO SCÈNE</div>
    <div class="login-sub">MANAGEMENT DASHBOARD</div>
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが正しくありません</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="logo">DUO SCÈNE</div>
        <div class="logo-sub">MANAGEMENT DASHBOARD</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="last-updated" id="last-updated">データ読み込み中...</div>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;cursor:pointer;font-size:11px;border-radius:2px;">ログアウト</button>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="showTab('summary', this)">経営サマリー</div>
    <div class="tab" onclick="showTab('marketing', this)">広告パフォーマンス</div>
    <div class="tab" onclick="showTab('web', this)">GA4・SEO</div>
    <div class="tab" onclick="showTab('leads', this)">リード分析</div>
  </div>

  <div class="content">

    <!-- 経営サマリー -->
    <div class="section active" id="tab-summary">
      <div class="section-header">
        <div class="section-title">経営サマリー</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)" id="summary-period"></div>
      </div>
      <div class="kpi-grid" id="kpi-summary"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">コンバージョンファネル</div>
          <div id="funnel-wrap"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">チャネル別転換率</div>
          <div style="overflow-x:auto;"><table class="data-table" id="channel-table"></table></div>
        </div>
        <div class="chart-card wide">
          <div class="chart-title">月次トレンド（問合せ・契約）</div>
          <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
        </div>
      </div>
      <div class="insight-grid" id="summary-insights"></div>
    </div>

    <!-- 広告パフォーマンス -->
    <div class="section" id="tab-marketing">
      <div class="section-header">
        <div class="section-title">広告パフォーマンス</div>
      </div>
      <div class="kpi-grid" id="kpi-marketing"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">媒体別CPA vs 目標</div>
          <div class="chart-wrap"><canvas id="cpa-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">費用配分</div>
          <div class="chart-wrap"><canvas id="budget-chart"></canvas></div>
        </div>
        <div class="chart-card wide">
          <div class="chart-title">媒体別パフォーマンス詳細</div>
          <div style="overflow-x:auto;"><table class="data-table" id="media-table"></table></div>
        </div>
      </div>
      <div class="insight-grid" id="marketing-insights"></div>
    </div>

    <!-- GA4・SEO -->
    <div class="section" id="tab-web">
      <div class="section-header">
        <div class="section-title">GA4・SEO</div>
      </div>
      <div class="kpi-grid" id="kpi-web"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">チャネル別セッション</div>
          <div class="chart-wrap"><canvas id="session-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">検索キーワード TOP5</div>
          <div style="overflow-x:auto;"><table class="data-table" id="keyword-table"></table></div>
        </div>
      </div>
      <div class="insight-grid" id="web-insights"></div>
    </div>

    <!-- リード分析 -->
    <div class="section" id="tab-leads">
      <div class="section-header">
        <div class="section-title">リード分析</div>
      </div>
      <div class="kpi-grid" id="kpi-leads"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">リードステータス分布</div>
          <div class="chart-wrap"><canvas id="lead-status-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">認知チャネル別リード数</div>
          <div class="chart-wrap"><canvas id="lead-channel-chart"></canvas></div>
        </div>
      </div>
      <div class="insight-grid" id="lead-insights"></div>
    </div>

  </div>
</div>

<script>
// ===== AUTH =====
const PASS = 'duoscene2026';
function doLogin() {
  const v = document.getElementById('pw-input').value;
  if (v === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ===== TAB =====
function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

// ===== DATA LOAD =====
async function loadData() {
  let data;
  try {
    const res = await fetch('/data/duoscene.json?t=' + Date.now());
    if (!res.ok) throw new Error('no data');
    data = await res.json();
    document.getElementById('last-updated').textContent = '最終更新: ' + (data.updated_at || '—');
  } catch(e) {
    // フォールバック: デモデータ
    data = getDemoData();
    document.getElementById('last-updated').textContent = '最終更新: デモデータ表示中';
  }
  renderAll(data);
}

function getDemoData() {
  return {
    updated_at: '2026-04-27 09:00',
    period: '2026年4月',
    summary: {
      inquiries: { value: 342, target: 400, prev: 355 },
      visits: { value: 87, target: 80, prev: 90 },
      applications: { value: 23, target: 28, prev: 25 },
      contracts: { value: 6, target: 8, prev: 8 }
    },
    funnel: [
      { label: '問合せ', value: 342 },
      { label: '来場', value: 87 },
      { label: '申込', value: 23 },
      { label: '契約', value: 6 }
    ],
    channels: [
      { name: 'Google広告', inquiries: 124, visits: 28, applications: 8, contracts: 2 },
      { name: 'Meta広告', inquiries: 89, visits: 22, applications: 5, contracts: 1 },
      { name: 'Yahoo広告', inquiries: 54, visits: 14, applications: 4, contracts: 2 },
      { name: 'LINE広告', inquiries: 43, visits: 13, applications: 3, contracts: 1 },
      { name: 'SEO/自然検索', inquiries: 22, visits: 7, applications: 2, contracts: 0 }
    ],
    trend: {
      months: ['11月', '12月', '1月', '2月', '3月', '4月'],
      inquiries: [290, 265, 310, 328, 355, 342],
      contracts: [5, 4, 7, 6, 8, 6]
    },
    marketing: {
      budget: { spent: 311000, total: 380000 },
      cv: { value: 87, target: 80 },
      cpa: { value: 3580, target: 4000 },
      impressions: { value: 11115, ctr: 2.9, ctr_target: 4.0 },
      media: [
        { name: 'Google', cost: 142000, cv: 38, cpa: 3737, ctr: 3.2, eval: '普通' },
        { name: 'Meta', cost: 88000, cv: 26, cpa: 3385, ctr: 2.4, eval: '良好' },
        { name: 'Yahoo', cost: 52000, cv: 15, cpa: 3467, ctr: 2.8, eval: '良好' },
        { name: 'LINE', cost: 29000, cv: 8, cpa: 3625, ctr: 3.8, eval: '普通' }
      ]
    },
    web: {
      sessions: { value: 8432, prev: 7501 },
      cvr: { value: 1.03, target: 1.20 },
      impressions: { value: 42180, prev: 38980 },
      avg_position: { value: 8.2, target: 5.0 },
      session_channels: {
        labels: ['Google広告', 'Meta広告', 'オーガニック', 'ダイレクト', 'その他'],
        values: [3210, 1890, 1540, 1120, 672]
      },
      keywords: [
        { kw: 'デュオセーヌ 久我山', impressions: 8240, clicks: 612, ctr: 7.4, position: 3.1 },
        { kw: '新浦安 新築マンション', impressions: 6120, clicks: 245, ctr: 4.0, position: 7.8 },
        { kw: '大宮 新築 タワーマンション', impressions: 5480, clicks: 182, ctr: 3.3, position: 9.2 },
        { kw: '名古屋 覚王山 マンション', impressions: 4210, clicks: 158, ctr: 3.8, position: 6.5 },
        { kw: 'デュオセーヌ 価格', impressions: 3840, clicks: 384, ctr: 10.0, position: 2.4 }
      ]
    },
    leads: {
      total: { value: 342, prev: 355 },
      hot: { value: 45, pct: 13.2 },
      response_rate: { value: 77, target: 90 },
      avg_response_hours: { value: 3.2, target: 1.0 },
      status: {
        labels: ['ホット', '検討中', '資料請求のみ', '来場済み', 'クローズ'],
        values: [45, 130, 89, 52, 26]
      },
      by_channel: {
        labels: ['Google広告', 'Meta広告', 'Yahoo広告', 'LINE', 'SEO'],
        values: [124, 89, 54, 43, 22]
      }
    }
  };
}

// ===== RENDER =====
function renderAll(d) {
  renderSummary(d);
  renderMarketing(d);
  renderWeb(d);
  renderLeads(d);
}

function kpiCard(label, value, unit, target, prev, type='') {
  const pct = target ? Math.round(value/target*100) : null;
  const delta = prev ? value - prev : null;
  const deltaStr = delta !== null ? (delta >= 0 ? '▲' : '▼') + ' ' + Math.abs(delta).toLocaleString() : '';
  const deltaClass = delta !== null ? (delta >= 0 ? 'up' : 'down') : '';
  const barClass = pct ? (pct >= 100 ? 'good' : pct >= 80 ? 'warn' : 'bad') : '';
  return `<div class="kpi-card ${type}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${typeof value === 'number' && value > 999 ? value.toLocaleString() : value}<span class="kpi-unit">${unit}</span></div>
    <div class="kpi-meta">
      ${target ? `<span class="kpi-target">目標: ${target.toLocaleString()}${unit}</span>` : ''}
      ${delta !== null ? `<span class="kpi-delta ${deltaClass}" style="margin-left:8px">${deltaStr}</span>` : ''}
    </div>
    ${target ? `<div class="progress-bar"><div class="progress-fill ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>` : ''}
  </div>`;
}

function renderSummary(d) {
  const s = d.summary;
  document.getElementById('summary-period').textContent = d.period || '';
  document.getElementById('kpi-summary').innerHTML =
    kpiCard('問合せ数', s.inquiries.value, '件', s.inquiries.target, s.inquiries.prev) +
    kpiCard('来場数', s.visits.value, '件', s.visits.target, s.visits.prev, 'good') +
    kpiCard('申込数', s.applications.value, '件', s.applications.target, s.applications.prev) +
    kpiCard('契約数', s.contracts.value, '件', s.contracts.target, s.contracts.prev);

  // Funnel
  const max = d.funnel[0].value;
  document.getElementById('funnel-wrap').innerHTML = `<div class="funnel">${
    d.funnel.map((f,i) => {
      const h = Math.round(f.value/max*140);
      const cvr = i>0 ? (f.value/d.funnel[i-1].value*100).toFixed(1)+'%' : '';
      return `<div class="funnel-step">
        <div class="funnel-val">${f.value}</div>
        ${cvr ? `<div class="funnel-cvr">${cvr}</div>` : ''}
        <div class="funnel-bar" style="height:${h}px;background:hsl(${220-i*30},80%,60%)"></div>
        <div class="funnel-label">${f.label}</div>
      </div>`;
    }).join('')
  }</div>`;

  // Channel table
  document.getElementById('channel-table').innerHTML =
    `<tr><th>チャネル</th><th>問合せ</th><th>来場</th><th>問→来</th><th>申込</th><th>来→申</th><th>契約</th></tr>` +
    d.channels.map(c => {
      const v2i = c.visits/c.inquiries*100;
      const a2v = c.applications/c.visits*100;
      return `<tr><td>${c.name}</td><td>${c.inquiries}</td><td>${c.visits}</td><td style="color:var(--accent2)">${v2i.toFixed(1)}%</td><td>${c.applications}</td><td style="color:var(--accent2)">${a2v.toFixed(1)}%</td><td>${c.contracts}</td></tr>`;
    }).join('');

  // Trend chart
  new Chart(document.getElementById('trend-chart'), {
    type: 'line',
    data: {
      labels: d.trend.months,
      datasets: [
        { label: '問合せ数', data: d.trend.inquiries, borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,0.1)', tension: 0.3, yAxisID: 'y' },
        { label: '契約数', data: d.trend.contracts, borderColor: '#4ff7a0', backgroundColor: 'rgba(79,247,160,0.1)', tension: 0.3, yAxisID: 'y1' }
      ]
    },

function renderMarketing(d) {
  const m = d.marketing;
  const budgetPct = Math.round(m.budget.spent/m.budget.total*100);
  document.getElementById('kpi-marketing').innerHTML =
    kpiCard('広告費', '¥'+Math.round(m.budget.spent/1000)+'K', '', null, null) +
    kpiCard('来場CV数', m.cv.value, '件', m.cv.target, null, 'good') +
    kpiCard('CPA', '¥'+m.cpa.value.toLocaleString(), '', null, null, 'good') +
    kpiCard('表示回数', m.impressions.value.toLocaleString(), '', null, null);

  new Chart(document.getElementById('cpa-chart'), {
    type: 'bar',
    data: {
      labels: m.media.map(x=>x.name),
      datasets: [
        { label: '実績CPA', data: m.media.map(x=>x.cpa), backgroundColor: '#4f8ef7' },
        { label: '目標CPA', data: m.media.map(()=>m.cpa.target), backgroundColor: 'rgba(247,193,79,0.3)', borderColor: '#f7c14f', borderWidth: 1 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8892a4', font: { size: 11 } } } }, scales: { x: { ticks: { color: '#4a5568' }, grid: { color: '#1e2330' } }, y: { ticks: { color: '#4a5568' }, grid: { color: '#1e2330' } } } }
  });

  new Chart(document.getElementById('budget-chart'), {
    type: 'doughnut',
    data: {
      labels: m.media.map(x=>x.name),
      datasets: [{ data: m.media.map(x=>x.cost), backgroundColor: ['#4f8ef7','#f7c14f','#4ff7a0','#f74f4f'] }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#8892a4', font: { size: 11 } } } } }
  });

  document.getElementById('media-table').innerHTML =
    `<tr><th>媒体</th><th>費用</th><th>CV</th><th>CPA</th><th>CTR</th><th>評価</th></tr>` +
    m.media.map(x => {
      const evalClass = x.eval==='良好'?'badge-good':x.eval==='普通'?'badge-warn':'badge-bad';
      return `<tr><td>${x.name}</td><td>¥${(x.cost/1000).toFixed(0)}K</td><td>${x.cv}</td><td>¥${x.cpa.toLocaleString()}</td><td>${x.ctr}%</td><td><span class="badge ${evalClass}">${x.eval}</span></td></tr>`;
    }).join('');

  document.getElementById('marketing-insights').innerHTML = `
    <div class="insight-card bad"><div class="insight-tag">⚠ 警告</div><div class="insight-text">LP3（覚王山）のCTRが1.9%。ファーストビューのビジュアルとコピーを改修し、A/Bテストを推奨。</div></div>
    <div class="insight-card good"><div class="insight-tag">✅ 好調</div><div class="insight-text">Meta広告のCPAが最優秀（¥3,385）。Google広告からMeta広告へ月額¥20K移行することで全体CPAを改善できる見込み。</div></div>
    <div class="insight-card warn"><div class="insight-tag">👁 注視</div><div class="insight-text">Google広告比率が45.7%と集中しすぎ。Meta・YahooへのROI改善を踏まえ段階的に移行推奨。</div></div>`;
}
