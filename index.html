<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デュオセーヌ 営業・集客ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --border: #1e2330;
  --accent: #4f8ef7;
  --accent2: #f7c14f;
  --accent3: #4ff7a0;
  --danger: #f74f4f;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #4a5568;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.login-box { background: var(--surface); border: 1px solid var(--border); padding: 48px; width: 360px; border-radius: 4px; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--accent); margin-bottom: 8px; }
.login-sub { color: var(--text2); font-size: 12px; margin-bottom: 32px; letter-spacing: 1px; }
.login-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; font-size: 14px; border-radius: 2px; outline: none; margin-bottom: 12px; font-family: 'DM Mono', monospace; }
.login-box input:focus { border-color: var(--accent); }
.login-box button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; font-size: 14px; cursor: pointer; border-radius: 2px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; letter-spacing: 1px; transition: opacity 0.2s; }
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

/* MAIN */
#main { display: none; }
.topbar { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.topbar-left { display: flex; align-items: center; gap: 24px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); }
.logo-sub { color: var(--text2); font-size: 11px; letter-spacing: 2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.last-updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

/* PERIOD SELECTOR */
.period-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 32px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.period-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; }
.period-btn { padding: 5px 14px; font-size: 11px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
.period-btn:hover, .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.period-custom { display: flex; align-items: center; gap: 8px; }
.period-custom input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; font-size: 11px; border-radius: 2px; font-family: 'DM Mono', monospace; width: 120px; }
.compare-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); cursor: pointer; margin-left: 16px; }
.compare-toggle input { cursor: pointer; }

/* ALERTS */
#alert-bar { display: none; background: rgba(247,79,79,0.08); border-bottom: 2px solid var(--danger); padding: 10px 32px; }
.alert-item { display: inline-flex; align-items: center; gap: 8px; margin-right: 24px; font-size: 12px; color: var(--danger); }
.alert-icon { font-size: 14px; }

/* TABS */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 32px; background: var(--surface); }
.tab { padding: 12px 20px; font-size: 12px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; letter-spacing: 1px; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); padding: 20px 24px; border-radius: 4px; position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
.kpi-card.good::before { background: var(--accent3); }
.kpi-card.warn::before { background: var(--accent2); }
.kpi-card.bad::before { background: var(--danger); }
.kpi-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.kpi-edit-btn { font-size: 10px; color: var(--text3); cursor: pointer; padding: 2px 6px; border: 1px solid var(--border); border-radius: 2px; background: none; }
.kpi-edit-btn:hover { color: var(--accent); border-color: var(--accent); }
.kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--text); letter-spacing: 2px; line-height: 1; }
.kpi-unit { font-size: 14px; color: var(--text2); margin-left: 4px; }
.kpi-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.kpi-target { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.kpi-delta { font-family: 'DM Mono', monospace; font-size: 11px; }
.kpi-delta.up { color: var(--accent3); }
.kpi-delta.down { color: var(--danger); }
.kpi-achievement { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.kpi-achievement.good { color: var(--accent3); }
.kpi-achievement.warn { color: var(--accent2); }
.kpi-achievement.bad { color: var(--danger); }
.progress-bar { background: var(--border); height: 4px; border-radius: 2px; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.8s ease; }
.progress-fill.good { background: var(--accent3); }
.progress-fill.warn { background: var(--accent2); }
.progress-fill.bad { background: var(--danger); }

/* TARGET MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); padding: 32px; width: 480px; border-radius: 4px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--text); margin-bottom: 24px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.modal-field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 6px; letter-spacing: 1px; }
.modal-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; font-size: 13px; border-radius: 2px; outline: none; font-family: 'DM Mono', monospace; }
.modal-field input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.btn-primary { background: var(--accent); color: #fff; border: none; padding: 10px 24px; font-size: 13px; cursor: pointer; border-radius: 2px; }
.btn-secondary { background: none; color: var(--text2); border: 1px solid var(--border); padding: 10px 24px; font-size: 13px; cursor: pointer; border-radius: 2px; }

/* CHARTS */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); padding: 20px 24px; border-radius: 4px; }
.chart-card.wide { grid-column: span 2; }
.chart-title { font-size: 11px; color: var(--text2); letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.chart-wrap { position: relative; height: 220px; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 10px 12px; color: var(--text3); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 400; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); color: var(--text); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 10px; letter-spacing: 1px; }
.badge-good { background: rgba(79,247,160,0.1); color: var(--accent3); }
.badge-warn { background: rgba(247,193,79,0.1); color: var(--accent2); }
.badge-bad { background: rgba(247,79,79,0.1); color: var(--danger); }

/* INSIGHT */
.insight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.insight-card { background: var(--surface2); border: 1px solid var(--border); padding: 16px; border-radius: 4px; border-left: 3px solid var(--accent); }
.insight-card.warn { border-left-color: var(--accent2); }
.insight-card.good { border-left-color: var(--accent3); }
.insight-card.bad { border-left-color: var(--danger); }
.insight-tag { font-size: 10px; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
.insight-text { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--text2); }

/* COMPARE BADGE */
.compare-val { font-family: 'DM Mono', monospace; font-size: 10px; padding: 1px 6px; border-radius: 2px; }
.compare-val.up { background: rgba(79,247,160,0.1); color: var(--accent3); }
.compare-val.down { background: rgba(247,79,79,0.1); color: var(--danger); }

/* FUNNEL */
.funnel { display: flex; align-items: flex-end; gap: 0; height: 160px; margin: 16px 0; }
.funnel-step { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
.funnel-bar { width: 80%; border-radius: 2px 2px 0 0; }
.funnel-label { font-size: 10px; color: var(--text3); margin-top: 8px; letter-spacing: 1px; }
.funnel-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); }
.funnel-cvr { font-size: 10px; color: var(--accent2); font-family: 'DM Mono', monospace; }

@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .chart-card.wide { grid-column: span 1; }
  .insight-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">DUO SCÈNE</div>
    <div class="login-sub">MANAGEMENT DASHBOARD</div>
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが正しくありません</div>
  </div>
</div>

<!-- TARGET MODAL -->
<div class="modal-overlay" id="target-modal">
  <div class="modal">
    <div class="modal-title">月次目標を設定</div>
    <div class="modal-grid">
      <div class="modal-field"><label>問合せ数 目標</label><input type="number" id="t-inquiries" placeholder="400"></div>
      <div class="modal-field"><label>来場数 目標</label><input type="number" id="t-visits" placeholder="80"></div>
      <div class="modal-field"><label>申込数 目標</label><input type="number" id="t-applications" placeholder="28"></div>
      <div class="modal-field"><label>契約数 目標</label><input type="number" id="t-contracts" placeholder="8"></div>
      <div class="modal-field"><label>広告費 予算（円）</label><input type="number" id="t-budget" placeholder="380000"></div>
      <div class="modal-field"><label>CPA 目標（円）</label><input type="number" id="t-cpa" placeholder="4000"></div>
      <div class="modal-field"><label>CVR 目標（%）</label><input type="number" id="t-cvr" step="0.01" placeholder="1.20"></div>
      <div class="modal-field"><label>アラート閾値（%）</label><input type="number" id="t-alert" placeholder="80" title="達成率がこの値を下回るとアラート表示"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveTargets()">保存</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="logo">DUO SCÈNE</div>
        <div class="logo-sub">MANAGEMENT DASHBOARD</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="last-updated" id="last-updated">データ読み込み中...</div>
      <button onclick="openModal()" style="background:none;border:1px solid var(--accent);color:var(--accent);padding:6px 14px;cursor:pointer;font-size:11px;border-radius:2px;">目標設定</button>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;cursor:pointer;font-size:11px;border-radius:2px;">ログアウト</button>
    </div>
  </div>

  <!-- ALERT BAR -->
  <div id="alert-bar">
    <div id="alert-items"></div>
  </div>

  <!-- PERIOD BAR -->
  <div class="period-bar">
    <span class="period-label">期間：</span>
    <button class="period-btn active" onclick="setPeriod('thisMonth', this)">今月</button>
    <button class="period-btn" onclick="setPeriod('lastMonth', this)">先月</button>
    <button class="period-btn" onclick="setPeriod('3months', this)">過去3ヶ月</button>
    <button class="period-btn" onclick="setPeriod('6months', this)">過去6ヶ月</button>
    <div class="period-custom">
      <input type="month" id="period-from" value="2026-04">
      <span style="color:var(--text3);font-size:11px">〜</span>
      <input type="month" id="period-to" value="2026-04">
      <button class="period-btn" onclick="setPeriodCustom()">適用</button>
    </div>
    <label class="compare-toggle">
      <input type="checkbox" id="compare-toggle" onchange="toggleCompare(this.checked)">
      <span>前期間と比較</span>
    </label>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="showTab('summary', this)">経営サマリー</div>
    <div class="tab" onclick="showTab('marketing', this)">広告パフォーマンス</div>
    <div class="tab" onclick="showTab('web', this)">GA4・SEO</div>
    <div class="tab" onclick="showTab('leads', this)">リード分析</div>
  </div>

  <div class="content">

    <!-- 経営サマリー -->
    <div class="section active" id="tab-summary">
      <div class="section-header">
        <div class="section-title">経営サマリー</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)" id="summary-period"></div>
      </div>
      <div class="kpi-grid" id="kpi-summary"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">コンバージョンファネル</div>
          <div id="funnel-wrap"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">チャネル別転換率</div>
          <div style="overflow-x:auto;"><table class="data-table" id="channel-table"></table></div>
        </div>
        <div class="chart-card wide">
          <div class="chart-title">月次トレンド（問合せ・契約）</div>
          <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
        </div>
      </div>
      <div class="insight-grid" id="summary-insights"></div>
    </div>

    <!-- 広告パフォーマンス -->
    <div class="section" id="tab-marketing">
      <div class="section-header"><div class="section-title">広告パフォーマンス</div></div>
      <div class="kpi-grid" id="kpi-marketing"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">媒体別CPA vs 目標</div>
          <div class="chart-wrap"><canvas id="cpa-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">費用配分</div>
          <div class="chart-wrap"><canvas id="budget-chart"></canvas></div>
        </div>
        <div class="chart-card wide">
          <div class="chart-title">媒体別パフォーマンス詳細</div>
          <div style="overflow-x:auto;"><table class="data-table" id="media-table"></table></div>
        </div>
      </div>
      <div class="insight-grid" id="marketing-insights"></div>
    </div>

    <!-- GA4・SEO -->
    <div class="section" id="tab-web">
      <div class="section-header"><div class="section-title">GA4・SEO</div></div>
      <div class="kpi-grid" id="kpi-web"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">チャネル別セッション</div>
          <div class="chart-wrap"><canvas id="session-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">検索キーワード TOP5</div>
          <div style="overflow-x:auto;"><table class="data-table" id="keyword-table"></table></div>
        </div>
      </div>
      <div class="insight-grid" id="web-insights"></div>
    </div>

    <!-- リード分析 -->
    <div class="section" id="tab-leads">
      <div class="section-header"><div class="section-title">リード分析</div></div>
      <div class="kpi-grid" id="kpi-leads"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">リードステータス分布</div>
          <div class="chart-wrap"><canvas id="lead-status-chart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">認知チャネル別リード数</div>
          <div class="chart-wrap"><canvas id="lead-channel-chart"></canvas></div>
        </div>
      </div>
      <div class="insight-grid" id="lead-insights"></div>
    </div>

  </div>
</div>

<script>
const PASS = 'duoscene2026';
let targets = JSON.parse(localStorage.getItem('ds_targets') || '{}');
let compareMode = false;
let currentPeriod = 'thisMonth';
let charts = {};

// デフォルト目標
const defaultTargets = { inquiries: 400, visits: 80, applications: 28, contracts: 8, budget: 380000, cpa: 4000, cvr: 1.20, alert: 80 };

function getTargets() { return Object.assign({}, defaultTargets, targets); }

// AUTH
function doLogin() {
  if (document.getElementById('pw-input').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadTargetsToModal();
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// MODAL
function openModal() {
  loadTargetsToModal();
  document.getElementById('target-modal').classList.add('open');
}
function closeModal() { document.getElementById('target-modal').classList.remove('open'); }
function loadTargetsToModal() {
  const t = getTargets();
  document.getElementById('t-inquiries').value = t.inquiries;
  document.getElementById('t-visits').value = t.visits;
  document.getElementById('t-applications').value = t.applications;
  document.getElementById('t-contracts').value = t.contracts;
  document.getElementById('t-budget').value = t.budget;
  document.getElementById('t-cpa').value = t.cpa;
  document.getElementById('t-cvr').value = t.cvr;
  document.getElementById('t-alert').value = t.alert;
}
function saveTargets() {
  targets = {
    inquiries: +document.getElementById('t-inquiries').value || defaultTargets.inquiries,
    visits: +document.getElementById('t-visits').value || defaultTargets.visits,
    applications: +document.getElementById('t-applications').value || defaultTargets.applications,
    contracts: +document.getElementById('t-contracts').value || defaultTargets.contracts,
    budget: +document.getElementById('t-budget').value || defaultTargets.budget,
    cpa: +document.getElementById('t-cpa').value || defaultTargets.cpa,
    cvr: +document.getElementById('t-cvr').value || defaultTargets.cvr,
    alert: +document.getElementById('t-alert').value || defaultTargets.alert,
  };
  localStorage.setItem('ds_targets', JSON.stringify(targets));
  closeModal();
  destroyCharts();
  renderAll(window._data);
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

// TAB
function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

// PERIOD
function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  destroyCharts();
  renderAll(window._data);
}
function setPeriodCustom() {
  currentPeriod = 'custom';
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  destroyCharts();
  renderAll(window._data);
}
function toggleCompare(v) {
  compareMode = v;
  destroyCharts();
  renderAll(window._data);
}

// DATA
async function loadData() {
  let data;
  try {
    const res = await fetch('/data/duoscene.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    data = await res.json();
    document.getElementById('last-updated').textContent = '最終更新: ' + (data.updated_at || '—');
  } catch(e) {
    data = getDemoData();
    document.getElementById('last-updated').textContent = '最終更新: デモデータ表示中';
  }
  window._data = data;
  renderAll(data);
}

function getPeriodData(data) {
  const trend = data.trend;
  const months = trend.months;
  let indices;
  if (currentPeriod === 'thisMonth') indices = [months.length - 1];
  else if (currentPeriod === 'lastMonth') indices = [months.length - 2];
  else if (currentPeriod === '3months') indices = [months.length-3, months.length-2, months.length-1];
  else if (currentPeriod === '6months') indices = months.map((m,i) => i);
  else indices = months.map((m,i) => i);

  const sum = (arr, idxs) => idxs.reduce((a, i) => a + (arr[i] || 0), 0);
  return {
    inquiries: sum(trend.inquiries, indices),
    contracts: sum(trend.contracts, indices),
    visits: sum(trend.visits || trend.inquiries.map(()=>0), indices),
    applications: sum(trend.applications || trend.inquiries.map(()=>0), indices),
    prevInquiries: indices[0] > 0 ? sum(trend.inquiries, indices.map(i=>i-1)) : null,
    prevContracts: indices[0] > 0 ? sum(trend.contracts, indices.map(i=>i-1)) : null,
    prevVisits: indices[0] > 0 ? sum(trend.visits || [], indices.map(i=>i-1)) : null,
    prevApplications: indices[0] > 0 ? sum(trend.applications || [], indices.map(i=>i-1)) : null,
    label: indices.map(i => months[i]).join('〜'),
    indices,
  };
}

// ALERTS
function checkAlerts(pd) {
  const t = getTargets();
  const threshold = t.alert / 100;
  const alerts = [];
  const pct = (v, tg) => tg ? v / tg : 1;
  if (pct(pd.inquiries, t.inquiries) < threshold) alerts.push(`問合せ数: ${pd.inquiries}件 / 目標${t.inquiries}件（${Math.round(pct(pd.inquiries,t.inquiries)*100)}%）`);
  if (pct(pd.visits, t.visits) < threshold) alerts.push(`来場数: ${pd.visits}件 / 目標${t.visits}件（${Math.round(pct(pd.visits,t.visits)*100)}%）`);
  if (pct(pd.contracts, t.contracts) < threshold) alerts.push(`契約数: ${pd.contracts}件 / 目標${t.contracts}件（${Math.round(pct(pd.contracts,t.contracts)*100)}%）`);
  const bar = document.getElementById('alert-bar');
  const items = document.getElementById('alert-items');
  if (alerts.length > 0) {
    bar.style.display = 'block';
    items.innerHTML = '⚠ アラート：' + alerts.map(a => `<span class="alert-item"><span class="alert-icon">●</span>${a}</span>`).join('');
  } else {
    bar.style.display = 'none';
  }
}

// KPI CARD
function kpiCard(label, value, unit, target, prev, prevLabel) {
  const pct = target ? Math.round(value / target * 100) : null;
  const delta = (prev !== null && prev !== undefined) ? value - prev : null;
  const deltaStr = delta !== null ? (delta >= 0 ? '▲' : '▼') + Math.abs(delta).toLocaleString() : '';
  const deltaClass = delta !== null ? (delta >= 0 ? 'up' : 'down') : '';
  const barClass = pct ? (pct >= 100 ? 'good' : pct >= 80 ? 'warn' : 'bad') : '';
  const cardClass = pct ? (pct >= 100 ? 'good' : pct >= 80 ? 'warn' : 'bad') : '';
  const achieveStr = pct !== null ? `${pct}%` : '';
  const achieveClass = pct ? (pct >= 100 ? 'good' : pct >= 80 ? 'warn' : 'bad') : '';
  const prevStr = compareMode && delta !== null ? `<span class="kpi-delta ${deltaClass}">${deltaStr}</span><span style="font-size:10px;color:var(--text3);margin-left:4px">前${prevLabel || '期間'}比</span>` : '';
  return `<div class="kpi-card ${cardClass}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${typeof value === 'number' && value > 999 ? value.toLocaleString() : value}<span class="kpi-unit">${unit}</span></div>
    <div class="kpi-row">
      ${target ? `<span class="kpi-target">目標: ${target.toLocaleString()}${unit}</span>` : ''}
      ${pct !== null ? `<span class="kpi-achievement ${achieveClass}">${achieveStr}</span>` : ''}
      ${prevStr}
    </div>
    ${target ? `<div class="progress-bar"><div class="progress-fill ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>` : ''}
  </div>`;
}

function renderAll(d) {

}

function renderSummary(d, pd) {

    kpiCard('来場数', pd.visits || d.summary.visits.value, '件', t.visits, pd.prevVisits, '月') +
    kpiCard('申込数', pd.applications || d.summary.applications.value, '件', t.applications, pd.prevApplications, '月') +
    kpiCard('契約数', pd.contracts, '件', t.contracts, pd.prevContracts, '月');

  const fv = [
    { label: '問合せ', value: pd.inquiries },
    { label: '来場', value: pd.visits || d.summary.visits.value },
    { label: '申込', value: pd.applications || d.summary.applications.value },
    { label: '契約', value: pd.contracts },
  ];
  const max = fv[0].value;
  document.getElementById('funnel-wrap').innerHTML = `<div class="funnel">${fv.map((f,i) => {
    const h = Math.round(f.value / max * 140);
    const cvr = i > 0 ? (f.value / fv[i-1].value * 100).toFixed(1) + '%' : '';
    return `<div class="funnel-step">
      <div class="funnel-val">${f.value}</div>
      ${cvr ? `<div class="funnel-cvr">${cvr}</div>` : ''}
      <div class="funnel-bar" style="height:${h}px;background:hsl(${220-i*30},80%,60%)"></div>

  }).join('')}</div>`;

  document.getElementById('channel-table').innerHTML =
    `<tr><th>チャネル</th><th>問合せ</th><th>来場</th><th>問→来</th><th>申込</th><th>来→申</th><th>契約</th></tr>` +

      <td>${c.applications}</td>
      <td style="color:var(--accent2)">${(c.applications/c.visits*100).toFixed(1)}%</td>
      <td>${c.contracts}</td>
    </tr>`).join('');

  const showInq = currentPeriod === '3months' ? d.trend.inquiries.slice(-3) : currentPeriod === 'lastMonth' ? d.trend.inquiries.slice(-2) : d.trend.inquiries;
  const showCon = currentPeriod === '3months' ? d.trend.contracts.slice(-3) : currentPeriod === 'lastMonth' ? d.trend.contracts.slice(-2) : d.trend.contracts;
  const trendTarget = showMonths.map(() => t.inquiries);
  charts['trend'] = new Chart(trendCtx, {
    type: 'line',
    data: {

      datasets: [
        { label: '問合せ数', data: showInq, borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,0.1)', tension: 0.3, yAxisID: 'y' },
        { label: '目標', data: trendTarget, borderColor: 'rgba(247,193,79,0.5)', borderDash: [4,4], pointRadius: 0, tension: 0, yAxisID: 'y' },

function generateInsights(pd, t) {
  const alerts = [];
  const goods = [];
  const warns = [];
  const contractPct = Math.round(pd.contracts / t.contracts * 100);
  const inquiryPct = Math.round(pd.inquiries / t.inquiries * 100);
  const visitPct = Math.round((pd.visits || 0) / t.visits * 100);
  if (contractPct < 80) alerts.push(`契約数が目標比${contractPct}%。申込→契約の転換率改善が急務。商談フォローアップの頻度を週2回に増やし、住宅ローン相談会の実施を推奨。`);
  if (inquiryPct < 80) alerts.push(`問合せ数が目標比${inquiryPct}%。Google広告のCVRが低下傾向のため、LPのファーストビュー改修と検索キーワードの見直しを推奨。`);
  if (visitPct >= 100) goods.push(`来場数が目標比${visitPct}%と超過達成。SNS来場予約キャンペーンの効果が高く、引き続き予算配分の維持・拡大を推奨。`);
  else if (visitPct >= 80) warns.push(`来場数が目標比${visitPct}%。目標まで残り${t.visits - (pd.visits||0)}件。来場促進施策の強化を検討。`);
  const all = [
    ...alerts.map(t => `<div class="insight-card bad"><div class="insight-tag">⚠ 警告</div><div class="insight-text">${t}</div></div>`),
    ...warns.map(t => `<div class="insight-card warn"><div class="insight-tag">👁 注視</div><div class="insight-text">${t}</div></div>`),
    ...goods.map(t => `<div class="insight-card good"><div class="insight-tag">✅ 好調</div><div class="insight-text">${t}</div></div>`),
  ];
  return all.slice(0, 3).join('') || '<div class="insight-card good"><div class="insight-tag">✅ 好調</div><div class="insight-text">全KPIが目標を達成しています。現状の施策を継続してください。</div></div>';
}
